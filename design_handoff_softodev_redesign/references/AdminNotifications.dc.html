<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #EEF0F4; }
  .num { font-family: 'Hanken Grotesk', sans-serif; direction:ltr; unicode-bidi:isolate; }
  .hk { font-family: 'Hanken Grotesk', sans-serif; }
  .ca { font-family: 'Cairo', sans-serif; }
  .hbtn { cursor: pointer; border: none; font-family: 'Cairo', sans-serif; transition: box-shadow .15s, transform .12s, background .15s; }
  .hbtn:active { transform: translateY(1px); }
  .ul:hover { color: #2563EB !important; }
  .home-wrap { container-type: inline-size; background:#F7F8FA; }
  .ad-layout { display: grid; grid-template-columns: 1fr; }
  .ad-side { display: none; }
  @container (min-width: 820px) {
    .ad-layout { grid-template-columns: 232px 1fr; }
    .ad-side { display: flex; }
  }
</style>
</helmet>
<div style="min-height:100vh; background:#EEF0F4; font-family:'IBM Plex Sans Arabic',sans-serif; padding:14px;">

  <div style="max-width:1320px; margin:0 auto 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:#0B1220; border-radius:14px; padding:10px 16px;">
    <div class="hk" style="color:#9CA3AF; font-size:12px; font-weight:600; letter-spacing:0.04em;">SOFTODEV ADMIN · {{ deviceLabel }} · {{ langLabel }} · {{ tx.pageTag }}</div>
    <div style="display:flex; gap:8px;">
      <div style="display:flex; background:rgba(255,255,255,0.08); border-radius:9px; padding:3px;">
        <button class="hbtn hk" onClick="{{ setAr }}" style="{{ arBtnStyle }}">عربي</button>
        <button class="hbtn hk" onClick="{{ setEn }}" style="{{ enBtnStyle }}">EN</button>
      </div>
      <div style="display:flex; background:rgba(255,255,255,0.08); border-radius:9px; padding:3px;">
        <button class="hbtn hk" onClick="{{ setDesktop }}" style="{{ deskBtnStyle }}">Desktop</button>
        <button class="hbtn hk" onClick="{{ setMobile }}" style="{{ mobBtnStyle }}">Mobile</button>
      </div>
    </div>
  </div>

  <div style="display:flex; justify-content:center;">
    <div class="home-wrap" dir="{{ dir }}" style="{{ wrapStyle }}">
      <div class="ad-layout">
        <aside class="ad-side" style="flex-direction:column; background:#0B1220; padding:20px 14px; min-height:720px;">
          <div style="display:flex; align-items:center; gap:9px; padding:6px 8px 22px;">
            <div class="hk" style="width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,#2563EB,#3B82F6); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px;">S</div>
            <div><div class="ca" style="font-weight:700; font-size:14px; color:#fff;">SoftoDev</div><div class="hk" style="font-size:10px; color:#6B7280; letter-spacing:0.05em;">ADMIN PANEL</div></div>
          </div>
          <nav style="display:flex; flex-direction:column; gap:3px;">
            <span class="hk" style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:11px; color:#9CA3AF; font-size:13px; font-weight:600; cursor:pointer;"><dc-import name="Icon" icon="grid" size="18" color="#9CA3AF" hint-size="18px,18px"></dc-import>{{ tx.nDash }}</span>
            <span class="hk" style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:11px; color:#9CA3AF; font-size:13px; font-weight:600; cursor:pointer;"><dc-import name="Icon" icon="package" size="18" color="#9CA3AF" hint-size="18px,18px"></dc-import>{{ tx.nOrders }}</span>
            <span class="hk" style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:11px; color:#9CA3AF; font-size:13px; font-weight:600; cursor:pointer;"><dc-import name="Icon" icon="tag" size="18" color="#9CA3AF" hint-size="18px,18px"></dc-import>{{ tx.nProducts }}</span>
            <span style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:11px; background:#2563EB; color:#fff; font-size:13px; font-weight:700; cursor:pointer;"><dc-import name="Icon" icon="chat" size="18" color="#fff" hint-size="18px,18px"></dc-import>{{ tx.nNotifications }}</span>
          </nav>
        </aside>

        <div style="display:flex; flex-direction:column;">
          <div style="background:#fff; border-bottom:1px solid #EAECEF; padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
            <div>
              <h1 class="ca" style="margin:0; font-weight:800; font-size:20px; color:#0B1220;">{{ tx.title }}</h1>
              <div class="hk" style="font-size:11.5px; color:#9097A1; margin-top:3px;"><span class="num">{{ unread }}</span> {{ tx.unread }}</div>
            </div>
            <button class="hbtn" onClick="{{ markAll }}" style="display:inline-flex; align-items:center; gap:7px; background:#F3F4F6; color:#374151; font-weight:700; font-size:12.5px; padding:9px 15px; border-radius:10px;"><dc-import name="Icon" icon="check" size="15" color="#374151" stroke="2.2" hint-size="15px,15px"></dc-import>{{ tx.markAll }}</button>
          </div>

          <div style="padding:22px; max-width:760px;">
            <div style="display:flex; flex-direction:column; gap:10px;">
              <sc-for list="{{ notifications }}" as="n" hint-placeholder-count="6">
                <div style="{{ n.rowStyle }}">
                  <span style="width:42px; height:42px; border-radius:12px; background:{{ n.bg }}; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;"><dc-import name="Icon" icon="{{ n.icon }}" size="20" color="{{ n.color }}" hint-size="20px,20px"></dc-import></span>
                  <div style="flex:1; min-width:0;">
                    <div style="display:flex; align-items:center; gap:8px;"><span class="ca" style="font-size:13.5px; font-weight:700; color:#0B1220;">{{ n.title }}</span><span style="{{ n.dot }}"></span></div>
                    <div style="font-size:12.5px; color:#6B7280; line-height:1.6; margin-top:2px;">{{ n.message }}</div>
                    <div class="hk" style="font-size:11px; color:#9097A1; margin-top:5px;">{{ n.time }}</div>
                  </div>
                  <span class="ul" style="color:#9097A1; cursor:pointer; display:inline-flex; flex-shrink:0;"><dc-import name="Icon" icon="{{ chevDir }}" size="17" color="#C4C8D0" hint-size="17px,17px"></dc-import></span>
                </div>
              </sc-for>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { lang:'ar', device:'desktop', allRead:false };
  get T() {
    const ar = {
      pageTag:'التنبيهات', nDash:'لوحة التحكّم', nOrders:'الطلبات', nProducts:'المنتجات', nNotifications:'التنبيهات',
      title:'التنبيهات', unread:'غير مقروء', markAll:'تعليم الكل كمقروء'
    };
    const en = {
      pageTag:'NOTIFICATIONS', nDash:'Dashboard', nOrders:'Orders', nProducts:'Products', nNotifications:'Notifications',
      title:'Notifications', unread:'unread', markAll:'Mark all as read'
    };
    return this.state.lang === 'ar' ? ar : en;
  }
  get notifList() {
    const ar = this.state.lang === 'ar';
    const base = [
      { type:'order', read:false, icon:'package', bg:'#E8F0FE', color:'#2563EB', title: ar?'طلب جديد #SD-48217':'New order #SD-48217', msg: ar?'أحمد العبيدي طلب ChatGPT Plus و Canva Pro بقيمة $202':'Ahmed ordered ChatGPT Plus & Canva Pro for $202', time: ar?'قبل دقيقتين':'2 minutes ago' },
      { type:'stock', read:false, icon:'tag', bg:'#FEF3C7', color:'#B45309', title: ar?'مخزون منخفض':'Low stock', msg: ar?'Coursera Plus — تبقّى 4 وحدات فقط':'Coursera Plus — only 4 units left', time: ar?'قبل 18 دقيقة':'18 minutes ago' },
      { type:'customer', read:false, icon:'user', bg:'#E7F6EE', color:'#15803D', title: ar?'عميل جديد':'New customer', msg: ar?'سارة كريم أنشأت حساباً جديداً':'Sara Kareem created a new account', time: ar?'قبل ساعة':'1 hour ago' },
      { type:'status', read:true, icon:'check', bg:'#F3F4F6', color:'#6B7280', title: ar?'تغيّرت حالة طلب':'Order status changed', msg: ar?'الطلب #SD-48102 أصبح مُفعّل':'Order #SD-48102 is now Activated', time: ar?'قبل 3 ساعات':'3 hours ago' },
      { type:'order', read:true, icon:'package', bg:'#F3F4F6', color:'#6B7280', title: ar?'طلب جديد #SD-48102':'New order #SD-48102', msg: ar?'يوسف علي طلب CapCut Pro بقيمة $12':'Yusuf ordered CapCut Pro for $12', time: ar?'قبل 5 ساعات':'5 hours ago' },
      { type:'status', read:true, icon:'check', bg:'#F3F4F6', color:'#6B7280', title: ar?'تم استرجاع طلب':'Order refunded', msg: ar?'الطلب #SD-47900 تم استرجاعه':'Order #SD-47900 was refunded', time: ar?'أمس':'Yesterday' },
    ];
    return base.map(n => {
      const unread = n.read === false && !this.state.allRead;
      return {
        icon:n.icon, bg:n.bg, color:n.color, title:n.title, message:n.msg, time:n.time,
        rowStyle: `display:flex; align-items:flex-start; gap:13px; padding:16px; border-radius:14px; border:1px solid ${unread?'#DCEAFE':'#EAECEF'}; background:${unread?'#F8FAFF':'#fff'};`,
        dot: unread ? 'width:8px; height:8px; border-radius:50%; background:#2563EB;' : 'display:none;',
      };
    });
  }
  toggleBtn(a){return a?'padding:5px 13px;border-radius:7px;font-size:12px;font-weight:700;background:#fff;color:#0B1220;':'padding:5px 13px;border-radius:7px;font-size:12px;font-weight:700;background:transparent;color:#9CA3AF;';}
  renderVals() {
    const ar = this.state.lang === 'ar'; const desk = this.state.device === 'desktop';
    const list = this.notifList;
    const unread = this.state.allRead ? 0 : 3;
    return {
      dir: ar?'rtl':'ltr', chevDir: ar?'chevronL':'chevron', tx:this.T, notifications:list, unread,
      langLabel: ar?'AR':'EN', deviceLabel: desk?'DESKTOP':'MOBILE',
      markAll:()=>this.setState({allRead:true}),
      wrapStyle: desk ? 'width:100%; max-width:1320px; border-radius:18px; overflow:hidden; box-shadow:0 20px 60px rgba(16,24,40,0.14); border:1px solid #E5E7EB;' : 'width:414px; border-radius:30px; overflow:hidden; box-shadow:0 20px 60px rgba(16,24,40,0.18); border:8px solid #0B1220;',
      setAr:()=>this.setState({lang:'ar'}), setEn:()=>this.setState({lang:'en'}),
      setDesktop:()=>this.setState({device:'desktop'}), setMobile:()=>this.setState({device:'mobile'}),
      arBtnStyle:this.toggleBtn(ar), enBtnStyle:this.toggleBtn(!ar), deskBtnStyle:this.toggleBtn(desk), mobBtnStyle:this.toggleBtn(!desk),
    };
  }
}
</script>
</body>
</html>
