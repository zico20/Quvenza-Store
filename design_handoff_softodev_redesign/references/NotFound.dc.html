<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #EEF0F4; }
  .num { font-family: 'Hanken Grotesk', sans-serif; }
  .hk { font-family: 'Hanken Grotesk', sans-serif; }
  .ca { font-family: 'Cairo', sans-serif; }
  .hbtn { cursor: pointer; border: none; font-family: 'Cairo', sans-serif; transition: background .15s, box-shadow .15s, transform .12s; }
  .hbtn:active { transform: translateY(1px); }
  .ul:hover { color: #2563EB !important; }
  .home-wrap { container-type: inline-size; background:#fff; }
</style>
</helmet>
<div style="min-height:100vh; background:#EEF0F4; font-family:'IBM Plex Sans Arabic',sans-serif; padding:14px;">

  <div style="max-width:1280px; margin:0 auto 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:#0B1220; border-radius:14px; padding:10px 16px;">
    <div class="hk" style="color:#9CA3AF; font-size:12px; font-weight:600; letter-spacing:0.04em;">SOFTODEV · {{ deviceLabel }} · {{ langLabel }} · 404</div>
    <div style="display:flex; gap:8px;">
      <div style="display:flex; background:rgba(255,255,255,0.08); border-radius:9px; padding:3px;">
        <button class="hbtn hk" onClick="{{ setAr }}" style="{{ arBtnStyle }}">عربي</button>
        <button class="hbtn hk" onClick="{{ setEn }}" style="{{ enBtnStyle }}">EN</button>
      </div>
      <div style="display:flex; background:rgba(255,255,255,0.08); border-radius:9px; padding:3px;">
        <button class="hbtn hk" onClick="{{ setDesktop }}" style="{{ deskBtnStyle }}">Desktop</button>
        <button class="hbtn hk" onClick="{{ setMobile }}" style="{{ mobBtnStyle }}">Mobile</button>
      </div>
    </div>
  </div>

  <div style="display:flex; justify-content:center;">
    <div class="home-wrap" dir="{{ dir }}" style="{{ wrapStyle }}">
      <header style="border-bottom:1px solid #EAECEF; padding:14px 22px; display:flex; align-items:center; gap:9px;">
        <div class="hk" style="width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,#2563EB,#3B82F6); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px;">S</div>
        <span class="ca" style="font-weight:700; font-size:16px; color:#0B1220;">SoftoDev</span>
      </header>

      <div style="padding:60px 24px 70px; text-align:center; background:radial-gradient(90% 70% at 50% 0%, #EAF1FE, rgba(234,241,254,0) 60%), #fff;">
        <div style="position:relative; display:inline-block;">
          <div class="hk" style="font-size:clamp(90px,18cqw,150px); font-weight:800; color:#0B1220; line-height:1; letter-spacing:-0.03em;">404</div>
          <div style="position:absolute; top:8%; inset-inline-end:-6px; width:46px; height:46px; border-radius:13px; background:linear-gradient(135deg,#2563EB,#3B82F6); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(37,99,235,0.35); transform:rotate(12deg);"><dc-import name="Icon" icon="search" size="24" color="#fff" hint-size="24px,24px"></dc-import></div>
        </div>
        <h1 class="ca" style="margin:18px 0 0; font-weight:800; font-size:clamp(22px,4cqw,30px); color:#0B1220;">{{ tx.title }}</h1>
        <p style="margin:14px auto 0; max-width:420px; font-size:14.5px; line-height:1.8; color:#6B7280;">{{ tx.sub }}</p>

        <div style="max-width:420px; margin:26px auto 0; position:relative;">
          <span style="position:absolute; top:50%; transform:translateY(-50%); inset-inline-start:15px; color:#9097A1; display:inline-flex;"><dc-import name="Icon" icon="search" size="19" color="#9097A1" hint-size="19px,19px"></dc-import></span>
          <input style="width:100%; font-family:'IBM Plex Sans Arabic'; font-size:14px; padding:14px 46px; border:1px solid #D6DAE1; border-radius:13px; outline:none; color:#111827;" value="{{ tx.searchPh }}">
        </div>

        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:22px;">
          <button class="hbtn" style="display:inline-flex; align-items:center; gap:8px; background:#2563EB; color:#fff; font-weight:700; font-size:14px; padding:13px 24px; border-radius:12px; box-shadow:0 8px 20px rgba(37,99,235,0.28);"><dc-import name="Icon" icon="grid" size="17" color="#fff" hint-size="17px,17px"></dc-import> {{ tx.home }}</button>
          <button class="hbtn" style="background:#fff; border:1px solid #D6DAE1; color:#111827; font-weight:700; font-size:14px; padding:13px 24px; border-radius:12px;">{{ tx.browse }}</button>
        </div>

        <div style="margin-top:40px;">
          <div class="hk" style="font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#9097A1; margin-bottom:14px;">{{ tx.popular }}</div>
          <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <sc-for list="{{ chips }}" as="c" hint-placeholder-count="4">
              <span class="hbtn" style="display:inline-flex; align-items:center; gap:7px; background:#F3F4F6; color:#374151; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:20px;"><dc-import name="Icon" icon="{{ c.icon }}" size="14" color="{{ c.color }}" hint-size="14px,14px"></dc-import>{{ c.label }}</span>
            </sc-for>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { lang:'ar', device:'desktop' };
  get T() {
    const ar = { title:'الصفحة غير موجودة', sub:'يبدو أن الرابط الذي تبحث عنه غير صحيح أو تم نقل الصفحة. لا تقلق — يمكنك العودة والمتابعة من هنا.', searchPh:'ابحث عن اشتراك…', home:'العودة للرئيسية', browse:'تصفّح المنتجات', popular:'الأكثر بحثاً' };
    const en = { title:'Page not found', sub:'The link you\u2019re looking for seems broken or the page has moved. No worries — you can head back and continue from here.', searchPh:'Search subscriptions…', home:'Back to home', browse:'Browse products', popular:'Most searched' };
    return this.state.lang === 'ar' ? ar : en;
  }
  get chipsData() {
    const ar = this.state.lang === 'ar';
    return [
      { label:'ChatGPT Plus', icon:'sparkle', color:'#2563EB' },
      { label:'Canva Pro', icon:'layers', color:'#7C3AED' },
      { label: ar?'الفيديو':'Video', icon:'video', color:'#0EA5E9' },
      { label: ar?'الكورسات':'Courses', icon:'book', color:'#16A34A' },
    ];
  }
  toggleBtn(a){return a?'padding:5px 13px;border-radius:7px;font-size:12px;font-weight:700;background:#fff;color:#0B1220;':'padding:5px 13px;border-radius:7px;font-size:12px;font-weight:700;background:transparent;color:#9CA3AF;';}
  renderVals() {
    const ar = this.state.lang === 'ar'; const desk = this.state.device === 'desktop';
    return {
      dir: ar?'rtl':'ltr', tx:this.T, chips:this.chipsData,
      langLabel: ar?'AR':'EN', deviceLabel: desk?'DESKTOP':'MOBILE',
      wrapStyle: desk ? 'width:100%; max-width:880px; border-radius:18px; overflow:hidden; box-shadow:0 20px 60px rgba(16,24,40,0.14); border:1px solid #E5E7EB;' : 'width:414px; border-radius:30px; overflow:hidden; box-shadow:0 20px 60px rgba(16,24,40,0.18); border:8px solid #0B1220;',
      setAr:()=>this.setState({lang:'ar'}), setEn:()=>this.setState({lang:'en'}),
      setDesktop:()=>this.setState({device:'desktop'}), setMobile:()=>this.setState({device:'mobile'}),
      arBtnStyle:this.toggleBtn(ar), enBtnStyle:this.toggleBtn(!ar), deskBtnStyle:this.toggleBtn(desk), mobBtnStyle:this.toggleBtn(!desk),
    };
  }
}
</script>
</body>
</html>
