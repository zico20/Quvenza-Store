<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e10"/>
      <stop offset="100%" style="stop-color:#1f1f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6a2b"/>
      <stop offset="100%" style="stop-color:#e55a1e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>
  <!-- Orange glow circle -->
  <circle cx="960" cy="315" r="280" fill="#ff6a2b" opacity="0.06"/>
  <!-- Brand name -->
  <text x="90" y="230" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#f5f5f4" letter-spacing="-2">SoftoDev</text>
  <!-- Accent dot -->
  <circle cx="680" cy="210" r="10" fill="#ff6a2b"/>
  <!-- Tagline Arabic -->
  <text x="90" y="310" font-family="Arial, sans-serif" font-size="38" fill="#a1a1a6">اشتراكات رقمية أصلية في العراق</text>
  <!-- Products line -->
  <text x="90" y="390" font-family="Arial, sans-serif" font-size="28" fill="#ff6a2b">ChatGPT Plus  •  Canva Pro  •  CapCut Pro  •  Coursera</text>
  <!-- Features line -->
  <text x="90" y="460" font-family="Arial, sans-serif" font-size="24" fill="#6b6b70">تفعيل فوري  •  دفع بالدينار العراقي  •  ضمان كامل</text>
  <!-- Domain -->
  <text x="90" y="560" font-family="Arial, sans-serif" font-size="22" fill="#3a3a42">softodeviqstore.com</text>
</svg>
